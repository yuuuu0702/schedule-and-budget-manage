<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>budget_management</title>
</head>

<body>

    <h1>budget_management</h1>
    


    <!-- プロジェクト追加 -->
    <h2>プロジェクト追加</h2>

    <input
        type="text"
        id="project-name"
        placeholder="プロジェクト名">

    <button onclick="addProject()">
        プロジェクト追加
    </button>

    <hr>

    <!-- プロジェクト一覧 -->
    <h2>プロジェクト一覧</h2>
    
    <button onclick="loadProjects()">
        更新
    </button>


    <ul id="project-list"></ul>

    <hr>

    <!-- 取引追加 -->
    <h2>取引追加</h2>

    <input
        type="number"
        id="amount"
        placeholder="金額">

    <select id="transaction-type">
        <option value="income">収入</option>
        <option value="expense">支出</option>
    </select>

    <input
        type="text"
        id="category"
        placeholder="カテゴリ">

    <input
        type="text"
        id="memo"
        placeholder="メモ">

    <button onclick="addTransaction()">
        取引追加
    </button>

    <hr>

    <!-- 取引一覧 -->
    <h2>取引一覧</h2>

    <button onclick="loadTransactions()">
        取引一覧表示
    </button>

    <ul id="transaction-list"></ul>

    <hr>

    <!-- 集計 -->
    <h2>集計</h2>

    <button onclick="loadSummary()">
        集計表示
    </button>

    <div id="summary"></div>

    <script>

        // 現在選択中のプロジェクトID
        let currentProjectId = 0

        // --------------------------
        // プロジェクト一覧取得
        // --------------------------
        async function loadProjects() {

            const response =
                await fetch("/projects")

            const data =
                await response.json()

            console.log(data)

            const list =
                document.getElementById("project-list")

            list.innerHTML = ""

            for (const [index, project] of data.entries()) {

                const li =
                    document.createElement("li")

                li.textContent =
                    `${index}: ${project.name}`

                li.onclick = function () {

                    currentProjectId = index

                    alert(
                        project.name +
                        " を選択しました"
                    )
                }

                list.appendChild(li)
            }
        }

        // --------------------------
        // プロジェクト追加
        // --------------------------
        async function addProject() {

            const name =
                document.getElementById(
                    "project-name"
                ).value

            if (name.trim() === "") {

                alert(
                    "プロジェクト名を入力してください"
                )

                return
            }

            const response =
                await fetch(
                    "/projects",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body: JSON.stringify({
                            name: name
                        })
                    }
                )

            if (!response.ok) {

                alert(
                    "プロジェクト作成に失敗しました"
                )

                return
            }

            document.getElementById(
                "project-name"
            ).value = ""

            loadProjects()
        }

        // --------------------------
        // 取引追加
        // --------------------------
        async function addTransaction() {

            const amount =
                Number(
                    document.getElementById(
                        "amount"
                    ).value
                )

            const type =
                document.getElementById(
                    "transaction-type"
                ).value

            const category =
                document.getElementById(
                    "category"
                ).value

            const memo =
                document.getElementById(
                    "memo"
                ).value

            const today =
                new Date()
                    .toISOString()
                    .split("T")[0]

            const response =
                await fetch(
                    `/projects/${currentProjectId}/transactions`,
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body: JSON.stringify({
                            date: today,
                            amount: amount,
                            type: type,
                            category: category,
                            memo: memo
                        })
                    }
                )

            if (!response.ok) {

                alert(
                    "取引追加に失敗しました"
                )

                return
            }

            alert(
                "取引を追加しました"
            )

            loadTransactions()
        }

        // --------------------------
        // 取引一覧取得
        // --------------------------
        async function loadTransactions() {

            const response =
                await fetch(
                    `/projects/${currentProjectId}/transactions`
                )

            const data =
                await response.json()

            const list =
                document.getElementById(
                    "transaction-list"
                )

            list.innerHTML = ""

            for (const transaction of data) {

                const li =
                    document.createElement("li")

                li.textContent =
                    `${transaction.date} | ${transaction.type} | ${transaction.category} | ${transaction.amount}円 | ${transaction.memo}`

                list.appendChild(li)
            }
        }

        // --------------------------
        // 集計取得
        // --------------------------
        async function loadSummary() {

            const response =
                await fetch(
                    `/projects/${currentProjectId}/summary`
                )

            const data =
                await response.json()

            document.getElementById(
                "summary"
            ).innerHTML =
                `
                <p>収入: ${data.income}円</p>
                <p>支出: ${data.expense}円</p>
                <p>残高: ${data.balance}円</p>
                `
        }

        // --------------------------
        // ページ読込時
        // --------------------------
        window.onload =
            loadProjects

    </script>

</body>

</html>
